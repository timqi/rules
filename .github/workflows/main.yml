name: Run rule_convert.py Script and Commit Output
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 */4 * * *'

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml aiohttp

      - name: Run script
        run: |
          python script/rule_convert.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'Update auto rules'
          if [ $? -eq 0 ]; then
            echo "Commit successful. Pushing to repository..."
            git push origin HEAD:main
          else
            echo "Commit failed. Aborting push."
          fi
        # env:
        #   GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
